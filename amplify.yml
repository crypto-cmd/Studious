version: 1
frontend:
    phases:
        preBuild:
            commands:
                - curl -fsSL https://bun.sh/install | bash
                - export BUN_INSTALL="$HOME/.bun"
                - export PATH="$BUN_INSTALL/bin:$PATH"
                - bun run frontend:init
        build:
            commands:
                - export BUN_INSTALL="$HOME/.bun"
                - export PATH="$BUN_INSTALL/bin:$PATH"
                - bun run frontend:build
    artifacts:
        baseDirectory: frontend/.next/build
        files:
            - '**/*'
    cache:
        paths:
            - 'node_modules/**/*'
            - ~/.bun/**/*
