name: Deploy Flask App to EC2 (Automated with uv)

on:
  push:
    branches:
      - main 

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the code
        uses: actions/checkout@v3

      - name: Provision and Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        env:
          ENV_FILE_SECRET: ${{ secrets.ENV_FILE }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: ENV_FILE_SECRET
          script: |
            # Exit immediately if ANY command fails
            set -e 

            APP_DIR="/home/ubuntu/Studious"
            BACKEND_DIR="$APP_DIR/backend"
            
            # 1. Update system and install system dependencies (curl added for uv)
            sudo apt-get update
            sudo apt-get install -y nginx git curl

            # 2. Install uv globally if it doesn't exist
            if ! command -v uv &> /dev/null; then
              curl -LsSf https://astral.sh/uv/install.sh | sh
            fi
            
            # Ensure uv is available in the current PATH for the runner
            # FIXED: Added $HOME/.local/bin where uv usually installs
            export PATH="$HOME/.local/bin:$HOME/.cargo/bin:$PATH"
            
            # Verify uv is actually installed before continuing
            uv --version

            # 3. Clone or pull the repository
            if [ ! -d "$APP_DIR" ]; then
              git clone https://github.com/${{ github.repository }}.git $APP_DIR
            fi
            
            cd $APP_DIR
            git pull origin main

            # 4. Set up Python virtual environment and dependencies using uv
            cd $BACKEND_DIR
            # Only create the virtual environment if it doesn't already exist
            if [ ! -d ".venv" ]; then
              uv venv 
            fi
            uv pip install -r requirements.txt # Automatically detects and uses the .venv

            echo "$ENV_FILE_SECRET" > .env

            # 5. Create Gunicorn Systemd Service
            cat << 'EOF' | sudo tee /etc/systemd/system/flaskapp.service > /dev/null
            [Unit]
            Description=Gunicorn instance to serve Flask App
            After=network.target

            [Service]
            User=ubuntu
            Group=www-data
            WorkingDirectory=/home/ubuntu/Studious/backend
            Environment="PATH=/home/ubuntu/Studious/backend/.venv/bin"
            ExecStart=/home/ubuntu/Studious/backend/.venv/bin/gunicorn --workers 3 --bind unix:flaskapp.sock -m 007 main:app

            [Install]
            WantedBy=multi-user.target
            EOF

            # 6. Create Nginx Configuration
            cat << 'EOF' | sudo tee /etc/nginx/sites-available/flaskapp > /dev/null
            server {
                listen 80;
                server_name _;

                location / {
                    include proxy_params;
                    proxy_pass http://unix:/home/ubuntu/Studious/backend/flaskapp.sock;
                }
            }
            EOF

            # 7. Enable Nginx Site
            sudo ln -sf /etc/nginx/sites-available/flaskapp /etc/nginx/sites-enabled/
            sudo rm -f /etc/nginx/sites-enabled/default

            # 8. Reload Daemons and Restart Services
            sudo systemctl daemon-reload
            sudo systemctl enable flaskapp
            sudo systemctl restart flaskapp
            sudo systemctl restart nginx