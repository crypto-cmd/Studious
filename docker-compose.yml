services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: studious-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
    networks:
      - studious
    expose:
      - "7860"

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: studious-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - studious
    depends_on:
      - backend

networks:
  studious:
    name: studious
    driver: bridge
